<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>WebRTC 诊断工具</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #1a1a1a; color: #eee; }
    h1 { color: #4CAF50; }
    .section { border: 1px solid #333; padding: 15px; margin: 10px 0; }
    .success { color: #4CAF50; }
    .error { color: #f44336; }
    .warning { color: #ff9800; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    #log { background: #0d0d0d; padding: 10px; max-height: 400px; overflow-y: auto; }
    .log-entry { margin: 2px 0; font-size: 13px; }
  </style>
</head>
<body>
  <h1>🔍 WebRTC 连接诊断工具</h1>

  <div class="section">
    <h2>当前 TURN 配置</h2>
    <pre id="current-config">加载中...</pre>
  </div>

  <div class="section">
    <h2>网络检测</h2>
    <button onclick="testSTUN()">测试 STUN 服务器</button>
    <button onclick="testAllServers()">测试所有服务器</button>
    <pre id="network-result">等待测试...</pre>
  </div>

  <div class="section">
    <h2>ICE Candidates 状态</h2>
    <pre id="ice-status">未开始</pre>
  </div>

  <div class="section">
    <h2>候选列表</h2>
    <pre id="candidates-list"></pre>
  </div>

  <div class="section">
    <h2>日志</h2>
    <div id="log"></div>
  </div>

  <script>
    const TURN_SERVER = 'share.wuyuan.tech';
    const TURN_USER = 'co-editor-user';
    const TURN_PASSWORD = 'oa90GJlg3lad.g3l;';

    const RTC_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'stun:stun2.l.google.com:19302' },
        {
          urls: `turn:${TURN_SERVER}:3478`,
          username: TURN_USER,
          credential: TURN_PASSWORD
        },
        {
          urls: `turn:${TURN_SERVER}:3478?transport=tcp`,
          username: TURN_USER,
          credential: TURN_PASSWORD
        },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
        { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
      ],
      iceTransportPolicy: 'all',
      iceCandidatePoolSize: 10
    };

    function log(msg, type = 'info') {
      const logEl = document.getElementById('log');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      const color = type === 'success' ? '#4CAF50' : type === 'error' ? '#f44336' : type === 'warning' ? '#ff9800' : '#ccc';
      entry.style.color = color;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
      logEl.appendChild(entry);
      logEl.scrollTop = logEl.scrollHeight;
    }

    // 显示当前配置
    document.getElementById('current-config').textContent = JSON.stringify(RTC_CONFIG, null, 2);

    let candidates = [];
    let pc = null;

    function testSTUN() {
      document.getElementById('network-result').textContent = '测试中...';
      candidates = [];
      document.getElementById('candidates-list').textContent = '';
      document.getElementById('ice-status').textContent = '收集中...';
      log('开始测试 STUN 服务器...');

      createTestConnection();
    }

    function testAllServers() {
      document.getElementById('network-result').textContent = '测试中...';
      candidates = [];
      document.getElementById('candidates-list').textContent = '';
      document.getElementById('ice-status').textContent = '收集中...';
      log('开始测试所有服务器（STUN + TURN）...');

      createTestConnection();
    }

    function createTestConnection() {
      if (pc) {
        pc.close();
      }

      pc = new RTCPeerConnection(RTC_CONFIG);

      pc.onicecandidate = (e) => {
        if (e.candidate) {
          candidates.push(e.candidate);
          log(`收到候选: ${e.candidate.type} - ${e.candidate.address || 'N/A'}:${e.candidate.port || 'N/A'} (${e.candidate.protocol || 'N/A'})`);
          updateCandidatesList();
        } else {
          log('ICE 收集完成', 'success');
          document.getElementById('ice-status').textContent = '✅ ICE 收集完成';
          analyzeResults();
        }
      };

      pc.onicegatheringstatechange = () => {
        log(`ICE 状态: ${pc.iceGatheringState}`);
        if (pc.iceGatheringState === 'complete') {
          document.getElementById('ice-status').textContent = '✅ ICE 收集完成';
        }
      };

      pc.oniceconnectionstatechange = () => {
        log(`连接状态: ${pc.iceConnectionState}`);
        if (pc.iceConnectionState === 'failed') {
          log('连接失败', 'error');
          document.getElementById('ice-status').textContent = '❌ 连接失败';
        } else if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
          log('连接成功', 'success');
          document.getElementById('ice-status').textContent = '✅ 连接成功';
        }
      };

      pc.onerror = (e) => {
        log(`错误: ${e.message}`, 'error');
      };

      // 创建 data channel 触发 ICE gathering
      pc.createDataChannel('test');

      // 创建 offer 以触发 ICE gathering
      pc.createOffer().then(offer => {
        log('创建 Offer 成功');
        pc.setLocalDescription(offer).then(() => {
          log('设置本地描述成功，开始收集候选...');
        }).catch(err => {
          log(`设置本地描述失败: ${err.message}`, 'error');
        });
      }).catch(err => {
        log(`创建 Offer 失败: ${err.message}`, 'error');
      });

      // 10秒超时
      setTimeout(() => {
        if (pc.iceGatheringState !== 'complete') {
          log('⚠️ 超时：ICE 收集未完成', 'warning');
          document.getElementById('ice-status').textContent = '⚠️ 超时';
          analyzeResults();
        }
      }, 10000);
    }

    function updateCandidatesList() {
      const types = {};
      candidates.forEach(c => {
        types[c.type] = (types[c.type] || 0) + 1;
      });

      let html = '';
      for (const [type, count] of Object.entries(types)) {
        html += `${type}: ${count}\n`;
      }
      document.getElementById('candidates-list').textContent = html;
    }

    function analyzeResults() {
      const result = [];

      // 检查 host 候选
      const hostCandidates = candidates.filter(c => c.type === 'host');
      if (hostCandidates.length > 0) {
        result.push(`✅ 主机候选: ${hostCandidates.length} 个`);
        result.push(`   - ${hostCandidates[0].address} (本地 IP)`);
      } else {
        result.push('❌ 无主机候选');
      }

      // 检查 srflx（STUN 反射地址）
      const srflxCandidates = candidates.filter(c => c.type === 'srflx');
      if (srflxCandidates.length > 0) {
        result.push(`✅ 服务器反射候选: ${srflxCandidates.length} 个`);
        result.push(`   - ${srflxCandidates[0].address} (公网 IP)`);
        result.push('   - STUN 服务器工作正常');
      } else {
        result.push('❌ 无服务器反射候选 - STUN 服务器可能不可用');
      }

      // 检查 relay（TURN 中继）
      const relayCandidates = candidates.filter(c => c.type === 'relay');
      if (relayCandidates.length > 0) {
        result.push(`✅ 中继候选: ${relayCandidates.length} 个`);
        result.push(`   - ${relayCandidates[0].address} (中继 IP)`);
        result.push('   - TURN 服务器工作正常');
      } else {
        result.push('❌ 无中继候选 - TURN 服务器连接失败');
        result.push('   - 可能需要公网 IP 才能点对点连接');
      }

      document.getElementById('network-result').textContent = result.join('\n');
    }

    log('诊断工具已加载，点击按钮开始测试');
  </script>
</body>
</html>
